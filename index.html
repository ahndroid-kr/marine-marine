<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
  <meta name="apple-mobile-web-app-title" content="Marine" />
  <meta name="screen-orientation" content="landscape" />
  <meta name="theme-color" content="#0a1628" />
  <link rel="manifest" href="manifest.json" />
  <title>Marine Marine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1628; }
    #safeArea {
      position: fixed;
      inset: 0;
      padding-top:    env(safe-area-inset-top,    0px);
      padding-right:  env(safe-area-inset-right,  0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left:   env(safe-area-inset-left,   0px);
    }
    canvas {
      display: block;
      touch-action: none;
      position: absolute;
      transform-origin: 0 0;
    }
  </style>
</head>
<body>
  <div id="safeArea">
    <canvas id="gameCanvas"></canvas>
  </div>
  <script src="gameState.js"></script>
  <script src="effects.js"></script>
  <script src="player.js"></script>
  <script src="enemy.js"></script>
  <script src="boss.js"></script>
  <script src="bullet.js"></script>
  <script src="item.js"></script>
  <script src="pet.js"></script>
  <script src="ui.js"></script>
  <script src="stageTransition.js"></script>
  <script src="deco.js"></script>
  <script src="stage/stage1.js"></script>
  <script src="stage/stage2.js"></script>
  <script src="stage/stage3.js"></script>
  <script src="stage/stage4.js"></script>
  <script src="main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW:', err));
    }
    try {
      screen.orientation.lock('landscape').catch(() => {});
    } catch (_) {}
  </script>
</body>
</html>
